<div class="card">
  <div class="left">
    <div>
      <img src="logo.png" alt="Logo" class="profile-page-logo" />
    </div>
  </div>
  <div class="divider-v"></div>
  <div class="right">
    <h1 class="form-title">Forgot password?</h1>
    <p class="form-sub">Enter your email and we'll send you a reset link.</p>

    <div class="field-wrap">
      <label class="field-label">Email</label>
      <p class="field-error" [class.show]="emailError">{{ emailError }}</p>
      <div class="input-row">
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="hello@example.com"
        />
      </div>
    </div>

    <div id="backError" style="color:#E24B4A; font-size:12px; min-height:16px;">
      {{ backError }}
    </div>

    <button
      class="submit-btn"
      [disabled]="isSending"
      (click)="sendReset()">
      {{ isSending ? 'Sending...' : 'Send reset link' }}
    </button>

    <div
      *ngIf="successMessage"
      style="color:green; font-size:13px; margin-top:10px;">
      {{ successMessage }}
    </div>

    <p class="signup-row">Remembered it? <a routerLink="/signin">Back to signin</a></p>
  </div>
</div>
