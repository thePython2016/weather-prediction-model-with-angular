<div class="card">

  <div class="left">
    <div>
      <img src="logo.png" alt="Logo" class="profile-page-logo" />
    </div>
  </div>

  <div class="divider-v"></div>

  <div class="right">
    <h1 class="form-title">Reset Password</h1>
    <p class="form-sub">Enter your new password below.</p>

    <!-- New Password -->
    <div class="field-wrap">
      <label class="field-label">New Password</label>
      <p class="field-error" *ngIf="passwordError">{{ passwordError }}</p>
      <div class="input-row">
        <input
          [type]="showNewPassword ? 'text' : 'password'"
          [(ngModel)]="newPassword"
          placeholder="Enter new password" />
        <button type="button" class="eye-btn" (click)="toggleNewPassword()" aria-label="Toggle password">
          <i class="ti" [class.ti-eye]="!showNewPassword" [class.ti-eye-off]="showNewPassword"></i>
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="field-wrap">
      <label class="field-label">Confirm Password</label>
      <p class="field-error" *ngIf="confirmError">{{ confirmError }}</p>
      <div class="input-row">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder="Confirm new password" />
        <button type="button" class="eye-btn" (click)="toggleConfirmPassword()" aria-label="Toggle password">
          <i class="ti" [class.ti-eye]="!showConfirmPassword" [class.ti-eye-off]="showConfirmPassword"></i>
        </button>
      </div>
    </div>

    <p class="back-error" *ngIf="backError">{{ backError }}</p>

    <button
      class="submit-btn"
      [disabled]="isResetting"
      (click)="resetPassword()">
      {{ isResetting ? 'Updating...' : 'Reset Password' }}
    </button>

    <div class="success-msg" *ngIf="successMessage">
      ✓ {{ successMessage }}
    </div>

    <p class="signup-row">Remembered it? <a routerLink="/signin">Back to signin</a></p>
  </div>

</div>
